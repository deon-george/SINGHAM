      100% { transform: translateY(320px); }
    }
    
    .matrix-col {
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 700;
      fill: url(#fade);
      animation-iteration-count: infinite;
      animation-timing-function: linear;
